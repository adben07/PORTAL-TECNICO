<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGI - Informe Técnico</title>

    <style>

        *{
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#f4f6f9;
            margin:0;
            padding:20px;
        }

        .container{
            max-width:1200px;
            margin:auto;
            background:white;
            padding:30px;
            border-radius:12px;
            box-shadow:0 2px 10px rgba(0,0,0,.15);
        }

        .section{
            margin-bottom:25px;
            padding:20px;
            border:1px solid #ddd;
            border-radius:10px;
        }

        .section h2{
            color:#003366;
        }

        .row{
            display:flex;
            gap:15px;
            flex-wrap:wrap;
            margin-bottom:15px;
        }

        .field{
            flex:1;
            min-width:250px;
            display:flex;
            flex-direction:column;
        }

        input, select, textarea{
            padding:10px;
            border:1px solid #ccc;
            border-radius:6px;
        }

        textarea{
            min-height:100px;
        }

        button{
            background:#003366;
            color:white;
            border:none;
            padding:12px 20px;
            border-radius:8px;
            cursor:pointer;
        }

    </style>

</head>

<body>

<div class="container">

    <h1>SGI - INFORME TÉCNICO</h1>

    <!-- AQUÍ AGREGAREMOS LOS BLOQUES -->

    <div class="section">

    <h2>Información del colaborador</h2>

    <div class="row">

        <div class="field">
            <label>Cliente</label>
            <input type="text" readonly>
        </div>

        <div class="field">
            <label>Dirección</label>
            <input type="text" readonly>
        </div>

    </div>

    <div class="row">

        <div class="field">
            <label>Teléfono</label>
            <input type="text" readonly>
        </div>

        <div class="field">
            <label>Persona encargada</label>
            <input type="text" readonly>
        </div>

    </div>

    <div class="field">
        <label>Novedad reportada</label>
        <textarea readonly></textarea>
    </div>

    </div>

</div>

</body>
</html>


<div class="section">

    <h2>Información General</h2>

    <div class="row">

        <div class="field">
            <label>Consecutivo SGI</label>
            <input id="sgi" readonly>
        </div>

        <div class="field">
            <label>Programación</label>
            <input id="programacion" readonly>
        </div>

    </div>

    <div class="row">

        <div class="field">
            <label>Máquina</label>

            <select id="maquina">
                <option>Seleccione</option>
                <option>Compresor Atlas</option>
                <option>Chiller York</option>
                <option value="nueva">
                    + Agregar nueva máquina
                </option>
            </select>

        </div>

        <div class="field">
            <label>Activo</label>

            <select id="activo">
                <option>Seleccione</option>
                <option>AT-001</option>
                <option>AT-002</option>
                <option value="nuevo">
                    + Agregar nuevo activo
                </option>
            </select>

        </div>

    </div>

    <div class="row">

        <div class="field"
             id="nuevaMaquinaDiv"
             style="display:none;">

            <label>Nueva máquina</label>
            <input type="text">

        </div>

        <div class="field"
             id="nuevoActivoDiv"
             style="display:none;">

            <label>Nuevo activo</label>
            <input type="text">

        </div>

    </div>

    <div class="row">

        <div class="field">
            <label>Fecha creación informe</label>
            <input type="date" id="fechaCreacion">
        </div>

        <div class="field">
            <label>Fecha finalización informe</label>
            <input type="date">
        </div>

    </div>

</div>



<div class="section">

    <h2>Desarrollo Técnico</h2>

    <div class="field">
        <label>Tipo de falla</label>

        <select>
            <option>Seleccione</option>
            <option>Operativo</option>
            <option>Intempestivo</option>
            <option>Envejecimiento</option>
            <option>Capacitación</option>
        </select>

    </div>

    <br>

    <label>Diagnóstico</label>
    <textarea></textarea>

    <br><br>

    <label>Actividades realizadas</label>
    <textarea></textarea>

    <br><br>

    <label>Repuestos instalados</label>
    <textarea></textarea>

    <br><br>

    <label>Repuestos pendientes</label>
    <textarea></textarea>

    <br><br>

    <label>Observaciones</label>
    <textarea></textarea>

</div>




<div class="section">

    <h2>Evidencias</h2>

    <div class="row">

        <div class="field">
            <label>Imágenes</label>
            <input type="file" accept="image/*" multiple>
        </div>

        <div class="field">
            <label>Videos</label>
            <input type="file" accept="video/*" multiple>
        </div>

    </div>

</div>


<div class="section">

    <h2>Responsables</h2>

    <div class="field">
        <label>Nombre técnico</label>
        <input type="text">
    </div>

    <br>

    <div class="field">
        <label>Responsable que recibe</label>
        <input type="text">
    </div>

    <br>

    <div class="field">
        <label>Cargo</label>
        <input type="text">
    </div>

</div>

<div class="section">

    <button onclick="window.print()">
        Generar PDF
    </button>

    <button>
        Enviar correo
    </button>

    <button>
        Guardar Airtable
    </button>

</div>


<script>

const hoy = new Date();

document.getElementById("fechaCreacion").value =
hoy.toISOString().split("T")[0];

document.getElementById("sgi").value =
"SGI-2026-0001";

document.getElementById("programacion").value =
"PRG-1001";

document.getElementById("maquina")
.addEventListener("change", function(){

    document.getElementById("nuevaMaquinaDiv")
    .style.display =
    this.value === "nueva"
    ? "block"
    : "none";

});

document.getElementById("activo")
.addEventListener("change", function(){

    document.getElementById("nuevoActivoDiv")
    .style.display =
    this.value === "nuevo"
    ? "block"
    : "none";

});

</script>
