<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SGI - Informe Técnico</title>

<style>

/* ====================================================
   IDENTIDAD VISUAL SGI
   Inspirada en el logo de engranaje verde
==================================================== */

:root{

    --verde-principal:#0B3D2E;
    --verde-secundario:#2E5E4E;
    --verde-claro:#DDEAE4;

    --gris-fondo:#F4F6F9;
    --blanco:#FFFFFF;

}

*{
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{

    background:var(--gris-fondo);

    margin:0;
    padding:0;

}

/* ==========================================
   BARRA SUPERIOR
========================================== */

.navbar{

    position:sticky;
    top:0;

    background:var(--verde-principal);

    padding:15px;

    z-index:1000;

    display:flex;
    justify-content:center;
    gap:15px;

}

.navbar a{

    color:white;

    text-decoration:none;

    font-weight:bold;

    padding:10px 15px;

    border-radius:8px;

}

.navbar a:hover{

    background:var(--verde-secundario);

}

/* ==========================================
   CONTENEDOR GENERAL
========================================== */

.container{

    max-width:1200px;

    margin:auto;

    padding:20px;

}

.card{

    background:white;

    padding:25px;

    margin-top:20px;

    border-radius:15px;

    box-shadow:0 3px 12px rgba(0,0,0,.12);

}

/* ==========================================
   ENCABEZADO
========================================== */

.header{

    text-align:center;

    padding:20px;

}

.header img{

    width:140px;

}

.header h1{

    color:var(--verde-principal);

    margin-bottom:5px;

}

.header p{

    color:#666;

}

/* ==========================================
   FORMULARIOS
========================================== */

.row{

    display:flex;

    gap:15px;

    flex-wrap:wrap;

}

.field{

    flex:1;

    min-width:250px;

    display:flex;

    flex-direction:column;

    margin-bottom:15px;

}

label{

    font-weight:bold;

    margin-bottom:5px;

}

input,
select,
textarea{

    padding:12px;

    border:1px solid #ccc;

    border-radius:8px;

    font-size:14px;

}

textarea{

    min-height:120px;

    resize:vertical;

}

.readonly{

    background:#f1f1f1;

}

/* ==========================================
   TITULOS DE BLOQUES
========================================== */

.section-title{

    color:var(--verde-principal);

    border-bottom:3px solid var(--verde-principal);

    padding-bottom:10px;

    margin-bottom:20px;

}

</style>

</head>

<body>

<!-- ==========================================
     BARRA DE NAVEGACIÓN RÁPIDA
========================================== -->

<div class="navbar">

    <a href="#cliente">🏢 Cliente</a>

    <a href="#ejecucion">🔧 Ejecución</a>

    <a href="#cierre">✅ Cierre</a>

</div>

<div class="container">

<!-- ==========================================
     ENCABEZADO SGI
========================================== -->

<div class="card header">

    <!-- Más adelante aquí pondremos el logo -->

    <h1>SGI - Sistema de Gestión de Informes</h1>

    <p>Special Group Ingenieros</p>

</div>

<!-- ==========================================
     ETAPA 2
     INFORMACIÓN DEL COLABORADOR
     SOLO LECTURA DESDE AIRTABLE
========================================== -->

<div class="card" id="cliente">

<h2 class="section-title">

🏢 Información del colaborador

</h2>

<div class="row">

    <div class="field">

        <label>Consecutivo SGI</label>

        <input id="sgi"
               class="readonly"
               readonly>

    </div>

    <div class="field">

        <label>Programación</label>

        <input id="programacion"
               class="readonly"
               readonly>

    </div>

</div>

<div class="row">

    <div class="field">

        <label>Cliente</label>

        <input id="clienteNombre"
               class="readonly"
               readonly>

    </div>

    <div class="field">

        <label>Dirección</label>

        <input id="direccion"
               class="readonly"
               readonly>

    </div>

</div>

<div class="row">

    <div class="field">

        <label>Teléfono</label>

        <input id="telefono"
               class="readonly"
               readonly>

    </div>

    <div class="field">

        <label>Persona encargada</label>

        <input id="encargado"
               class="readonly"
               readonly>

    </div>

</div>

<div class="row">

    <div class="field">

        <label>Cargo</label>

        <input id="cargo"
               class="readonly"
               readonly>

    </div>

    <div class="field">

        <label>Prioridad</label>

        <input id="prioridad"
               class="readonly"
               readonly>

    </div>

</div>

<div class="field">

    <label>Novedad reportada</label>

    <textarea id="novedad"
              class="readonly"
              readonly></textarea>

</div>

</div>

<!-- ==========================================
     ETAPA 3
     INFORMACIÓN GENERAL
========================================== -->

<div class="card" id="ejecucion">

<h2 class="section-title">

🔧 Información General

</h2>

<!-- ==========================================
     INFORMACIÓN GENERAL EDITABLE
========================================== -->

<div class="row">

    <div class="field">

        <label>Máquina</label>

        <select id="maquina">

            <option value="">Seleccione una máquina</option>

            <!-- Estas opciones vendrán desde Airtable -->

            <option>Compresor Atlas</option>

            <option>Chiller York</option>

            <option>Torre de enfriamiento</option>

            <option value="nueva">

                + Agregar nueva máquina

            </option>

        </select>

    </div>

    <div class="field">

        <label>Activo</label>

        <select id="activo">

            <option value="">Seleccione un activo</option>

            <!-- Estos activos vendrán desde Airtable -->

            <option>AT-001</option>

            <option>AT-002</option>

            <option>AT-003</option>

            <option value="nuevo">

                + Agregar nuevo activo

            </option>

        </select>

    </div>

</div>

<!-- NUEVA MÁQUINA Y NUEVO ACTIVO -->

<div class="row">

    <div class="field"

         id="nuevaMaquinaDiv"

         style="display:none;">

        <label>Nueva máquina</label>

        <input

            type="text"

            id="nuevaMaquina"

            placeholder="Ingrese el nombre de la máquina">

    </div>

    <div class="field"

         id="nuevoActivoDiv"

         style="display:none;">

        <label>Nuevo activo</label>

        <input

            type="text"

            id="nuevoActivo"

            placeholder="Ingrese el nuevo activo">

    </div>

</div>

<div class="row">

    <div class="field">

        <label>Fecha creación informe</label>

        <input

            type="date"

            id="fechaCreacion">

    </div>

    <div class="field">

        <label>Fecha finalización informe</label>

        <input

            type="date"

            id="fechaFinalizacion">

    </div>

</div>

</div>

<!-- ==========================================
     DESARROLLO TÉCNICO
========================================== -->

<div class="card">

<h2 class="section-title">

🛠 Desarrollo Técnico

</h2>

<div class="field">

    <label>Tipo de falla</label>

    <select id="tipoFalla">

        <option value="">Seleccione</option>

        <option>Operativo</option>

        <option>Intempestivo</option>

        <option>Envejecimiento</option>

        <option>Capacitación</option>

    </select>

</div>

<div class="field">

    <label>Diagnóstico</label>

    <textarea id="diagnostico"></textarea>

</div>

<div class="field">

    <label>Actividades realizadas</label>

    <textarea id="actividades"></textarea>

</div>

<div class="field">

    <label>Repuestos instalados</label>

    <textarea id="repuestosInstalados"></textarea>

</div>

<div class="field">

    <label>Repuestos pendientes</label>

    <textarea id="repuestosPendientes"></textarea>

</div>

<div class="field">

    <label>Observaciones</label>

    <textarea id="observaciones"></textarea>

</div>

</div>


    <!-- ==========================================
     ETAPA 5
     EVIDENCIAS
========================================== -->

<div class="card" id="cierre">

<h2 class="section-title">

📷 Evidencias

</h2>

<div class="row">

    <div class="field">

        <label>Imágenes</label>

        <input
            type="file"
            accept="image/*"
            multiple>

    </div>

    <div class="field">

        <label>Videos</label>

        <input
            type="file"
            accept="video/*"
            multiple>

    </div>

</div>

</div>

<!-- ==========================================
     ETAPA 6
     RESPONSABLES Y FIRMAS
========================================== -->

<div class="card">

<h2 class="section-title">

✍️ Cierre del servicio

</h2>

<div class="row">

    <div class="field">

        <label>Nombre completo del técnico</label>

        <input
            type="text"
            id="tecnico">

    </div>

    <div class="field">

        <label>Responsable que recibe</label>

        <input
            type="text"
            id="responsable">

    </div>

</div>

<div class="row">

    <div class="field">

        <label>Cargo</label>

        <input
            type="text"
            id="cargoRecibe">

    </div>

</div>

<div class="row">

    <div class="field">

        <label>Firma del técnico</label>

        <input
            type="file"
            accept="image/*">

    </div>

    <div class="field">

        <label>Firma del cliente</label>

        <input
            type="file"
            accept="image/*">

    </div>

</div>

</div>

<!-- ==========================================
     ETAPA 7
     BOTONES DE ACCIÓN
========================================== -->

<div class="card">

<h2 class="section-title">

⚙️ Acciones

</h2>

<div class="actions">

    <button onclick="window.print()">
        📄 Generar PDF
    </button>

    <button>
        📧 Enviar correo
    </button>

    <button>
        📱 WhatsApp
    </button>

    <button>
        ☁️ Airtable
    </button>

    <button>
        💾 Guardar borrador
    </button>

</div>

</div>

</div>

<!-- ==========================================
     ETAPA 8
     JAVASCRIPT
========================================== -->

<script>

/* Fecha automática */

const hoy = new Date();

document.getElementById(
    "fechaCreacion"
).value =
hoy.toISOString().split("T")[0];

/* Datos de prueba */

document.getElementById(
    "sgi"
).value =
"SGI-2026-0001";

document.getElementById(
    "programacion"
).value =
"PRG-1001";

document.getElementById(
    "clienteNombre"
).value =
"Cliente de prueba";

document.getElementById(
    "direccion"
).value =
"Medellín";

document.getElementById(
    "telefono"
).value =
"3000000000";

document.getElementById(
    "encargado"
).value =
"Juan Pérez";

document.getElementById(
    "cargo"
).value =
"Administrador";

document.getElementById(
    "prioridad"
).value =
"Alta";

document.getElementById(
    "novedad"
).value =
"Equipo no enciende.";

/* Mostrar nueva máquina */

document.getElementById(
    "maquina"
).addEventListener(
    "change",
    function(){

    document.getElementById(
        "nuevaMaquinaDiv"
    ).style.display =
    this.value === "nueva"
    ? "block"
    : "none";

});

/* Mostrar nuevo activo */

document.getElementById(
    "activo"
).addEventListener(
    "change",
    function(){

    document.getElementById(
        "nuevoActivoDiv"
    ).style.display =
    this.value === "nuevo"
    ? "block"
    : "none";

});

</script>

</body>
</html>
