<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGI - Informe Técnico</title>

    <style>

        *{
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:#f4f6f9;
            margin:0;
            padding:20px;
        }

        .container{
            max-width:1200px;
            margin:auto;
            background:white;
            padding:30px;
            border-radius:12px;
            box-shadow:0 2px 10px rgba(0,0,0,.15);
        }

        .section{
            margin-bottom:25px;
            padding:20px;
            border:1px solid #ddd;
            border-radius:10px;
        }

        .section h2{
            color:#003366;
        }

        .row{
            display:flex;
            gap:15px;
            flex-wrap:wrap;
            margin-bottom:15px;
        }

        .field{
            flex:1;
            min-width:250px;
            display:flex;
            flex-direction:column;
        }

        input, select, textarea{
            padding:10px;
            border:1px solid #ccc;
            border-radius:6px;
        }

        textarea{
            min-height:100px;
        }

        button{
            background:#003366;
            color:white;
            border:none;
            padding:12px 20px;
            border-radius:8px;
            cursor:pointer;
        }

    </style>

</head>

<body>

<div class="container">

    <h1>SGI - INFORME TÉCNICO</h1>

    <!-- AQUÍ AGREGAREMOS LOS BLOQUES -->

</div>

</body>
</html>
